# Grudge Arena - Game Streaming via Apache Guacamole
# Streams the WoW 1.7.1 client to a web browser over HTML5
#
# Architecture:
#   Browser <--HTML5/WebSocket--> guacamole <--guacamole protocol--> guacd <--RDP/VNC--> WoW Client
#
# Usage:
#   docker-compose up -d

version: '3.8'

services:
  # MySQL for Guacamole auth & dynamic connections
  guac-db:
    image: mysql:8.0
    container_name: arena-guac-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: guac_root_pw
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: guac_db_pw
    volumes:
      - guac-dbdata:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - arena-net

  # Guacamole daemon - handles the actual RDP/VNC connections
  guacd:
    image: guacamole/guacd:1.5.4
    container_name: arena-guacd
    restart: unless-stopped
    networks:
      - arena-net

  # Guacamole web app - HTML5 frontend + REST API
  guacamole:
    image: guacamole/guacamole:1.5.4
    container_name: arena-guacamole
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      MYSQL_HOSTNAME: guac-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: guac_db_pw
    depends_on:
      - guacd
      - guac-db
    networks:
      - arena-net

volumes:
  guac-dbdata:

networks:
  arena-net:
    driver: bridge
